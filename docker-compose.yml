services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  receiver:
    build: .
    environment:
      SERVICE: receiver
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8123:8123"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8123/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  worker:
    build: .
    volumes:
      - ./src/worker/system_prompt.md:/app/worker/system_prompt.md:ro
    environment:
      SERVICE: worker
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABRICKS_HOST: ${DATABRICKS_HOST}
      DATABRICKS_WAREHOUSE_ID: ${DATABRICKS_WAREHOUSE_ID}
      DATABRICKS_ACCESS_TOKEN: ${DATABRICKS_ACCESS_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_COUNT:-2}

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http receiver:8123
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      receiver:
        condition: service_healthy

volumes:
  redis_data:
